name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Resolve release metadata
        id: meta
        shell: bash
        run: |
          VERSION=$(node -p "require('./package.json').version")
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            TAG_VERSION="${GITHUB_REF_NAME#v}"
            if [[ "${TAG_VERSION}" != "${VERSION}" ]]; then
              echo "Tag version ${TAG_VERSION} does not match package.json version ${VERSION}" >&2
              exit 1
            fi
          fi
          OWNER_LC=$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')
          echo "version=${VERSION}" >> "${GITHUB_OUTPUT}"
          echo "owner_lc=${OWNER_LC}" >> "${GITHUB_OUTPUT}"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Prepare release assets
        shell: bash
        run: |
          mkdir -p release
          npm pack --pack-destination release
          tar -czf "release/testcase-generator-${{ steps.meta.outputs.version }}-bundle.tgz" \
            dist public README.md docs openclaw.plugin.json SKILL.md docker-compose.yml .env.example scripts/install.sh package.json

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            release/*.tgz

      - name: Publish to npm
        id: publish_npm
        if: ${{ env.NPM_TOKEN != '' }}
        continue-on-error: true
        env:
          NODE_AUTH_TOKEN: ${{ env.NPM_TOKEN }}
        run: npm publish --access public

      - name: Set up Docker Buildx
        id: setup_buildx
        continue-on-error: true
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        id: login_ghcr
        continue-on-error: true
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push GHCR image
        id: publish_ghcr
        continue-on-error: true
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ steps.meta.outputs.owner_lc }}/testcase-generator:${{ steps.meta.outputs.version }}
            ghcr.io/${{ steps.meta.outputs.owner_lc }}/testcase-generator:latest

      - name: Login to Docker Hub
        id: login_dockerhub
        if: ${{ env.DOCKERHUB_USERNAME != '' && env.DOCKERHUB_TOKEN != '' }}
        continue-on-error: true
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ env.DOCKERHUB_TOKEN }}

      - name: Build and push Docker Hub image
        id: publish_dockerhub
        if: ${{ env.DOCKERHUB_USERNAME != '' && env.DOCKERHUB_TOKEN != '' }}
        continue-on-error: true
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.DOCKERHUB_USERNAME }}/testcase-generator:${{ steps.meta.outputs.version }}
            ${{ env.DOCKERHUB_USERNAME }}/testcase-generator:latest

      - name: Check publish results
        if: always()
        shell: bash
        run: |
          npm_outcome="${{ steps.publish_npm.outcome }}"
          ghcr_login_outcome="${{ steps.login_ghcr.outcome }}"
          ghcr_publish_outcome="${{ steps.publish_ghcr.outcome }}"
          dockerhub_login_outcome="${{ steps.login_dockerhub.outcome }}"
          dockerhub_publish_outcome="${{ steps.publish_dockerhub.outcome }}"

          {
            echo "## Publish outcomes"
            echo ""
            echo "- npm: ${npm_outcome}"
            echo "- ghcr login: ${ghcr_login_outcome}"
            echo "- ghcr publish: ${ghcr_publish_outcome}"
            echo "- dockerhub login: ${dockerhub_login_outcome}"
            echo "- dockerhub publish: ${dockerhub_publish_outcome}"
          } >> "${GITHUB_STEP_SUMMARY}"

          failures=()

          if [[ "${npm_outcome}" == "failure" ]]; then
            echo "::error title=Publish target failed::npm publish failed"
            failures+=("npm")
          fi
          if [[ "${ghcr_login_outcome}" == "failure" || "${ghcr_publish_outcome}" == "failure" ]]; then
            echo "::error title=Publish target failed::GHCR publish failed"
            failures+=("ghcr")
          fi
          if [[ "${dockerhub_login_outcome}" == "failure" || "${dockerhub_publish_outcome}" == "failure" ]]; then
            echo "::error title=Publish target failed::Docker Hub publish failed"
            failures+=("dockerhub")
          fi

          if [[ ${#failures[@]} -gt 0 ]]; then
            echo "Failed publish targets: ${failures[*]}" >&2
            exit 1
          fi
