name: Sync Docker Hub Overview

on:
  push:
    branches:
      - main
    paths:
      - docs/dockerhub-overview.md
      - .github/workflows/dockerhub-description.yml
  workflow_dispatch:

jobs:
  dockerhub-description:
    runs-on: ubuntu-latest
    env:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Update Docker Hub overview
        if: ${{ env.DOCKERHUB_USERNAME != '' && env.DOCKERHUB_TOKEN != '' }}
        uses: peter-evans/dockerhub-description@v5
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ env.DOCKERHUB_TOKEN }}
          repository: ${{ env.DOCKERHUB_USERNAME }}/testcase-generator
          short-description: AI-powered test case generation for PRDs, specs, and multimodal QA inputs
          readme-filepath: ./docs/dockerhub-overview.md
